function KlientSearch({ onSelect }) {
  const [query, setQuery] = React.useState('');
  const [suggestions, setSuggestions] = React.useState([]);
  const [selected, setSelected] = React.useState(null);
  const wrapRef = React.useRef(null);

  React.useEffect(() => {
    const handler = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setSuggestions([]); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const handleChange = (e) => {
    const v = e.target.value;
    setQuery(v);
    setSelected(null);
    onSelect(null);
    if (v.length >= 2) {
      setSuggestions(KLIENTI.filter(k =>
        k.name.toLowerCase().includes(v.toLowerCase()) ||
        k.ico.includes(v)
      ).slice(0, 8));
    } else {
      setSuggestions([]);
    }
  };

  const handleSelect = (k) => {
    setQuery(k.name);
    setSuggestions([]);
    setSelected(k);
    onSelect(k);
  };

  return (
    <div ref={wrapRef} className="position-relative">
      <div className="input-group">
        <span className="input-group-text"><i className="bi bi-search"></i></span>
        <input
          type="text"
          className={`form-control ${selected ? 'is-valid' : ''}`}
          placeholder="Hledat klienta (název firmy nebo IČO)…"
          value={query}
          onChange={handleChange}
        />
        {query && <button className="btn btn-outline-secondary" onClick={() => { setQuery(''); setSuggestions([]); setSelected(null); onSelect(null); }}><i className="bi bi-x"></i></button>}
      </div>
      {suggestions.length > 0 && (
        <div className="autocomplete-list">
          {suggestions.map(k => (
            <div key={k.id} className="autocomplete-item" onMouseDown={() => handleSelect(k)}>
              <div className="fw-semibold small">{k.name}</div>
              <div className="text-muted" style={{fontSize: '0.78rem'}}>
                IČO: {k.ico} &nbsp;·&nbsp; DIČ: {k.dic} &nbsp;·&nbsp; {k.city}, {k.country}
              </div>
            </div>
          ))}
        </div>
      )}
      {query.length >= 2 && suggestions.length === 0 && !selected && (
        <div className="autocomplete-list">
          <div className="autocomplete-item text-muted small">Žádný klient nenalezen. <a href="#">Vytvořit nového klienta</a></div>
        </div>
      )}
    </div>
  );
}

function ProductSearch({ onAdd }) {
  const [query, setQuery] = React.useState('');
  const [results, setResults] = React.useState([]);
  const wrapRef = React.useRef(null);

  React.useEffect(() => {
    const handler = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setResults([]); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const handleChange = (e) => {
    const v = e.target.value;
    setQuery(v);
    if (v.length >= 2) {
      setResults(PRODUKTY.filter(p =>
        p.name.toLowerCase().includes(v.toLowerCase()) ||
        p.ean.includes(v) ||
        p.producer.toLowerCase().includes(v.toLowerCase())
      ).slice(0, 8));
    } else {
      setResults([]);
    }
  };

  const handleAdd = (p) => {
    onAdd(p);
    setQuery('');
    setResults([]);
  };

  return (
    <div ref={wrapRef} className="position-relative">
      <div className="input-group input-group-sm">
        <span className="input-group-text"><i className="bi bi-upc-scan"></i></span>
        <input
          type="text"
          className="form-control"
          placeholder="Hledat produkt (název, EAN, výrobce)…"
          value={query}
          onChange={handleChange}
        />
      </div>
      {results.length > 0 && (
        <div className="product-search-results">
          {results.map(p => (
            <div key={p.id} className="product-result-item" onMouseDown={() => handleAdd(p)}>
              <div className="d-flex justify-content-between align-items-start">
                <div>
                  <div className="small fw-semibold">{p.short}</div>
                  <div style={{fontSize: '0.75rem'}} className="text-muted">{p.producer} &nbsp;·&nbsp; {p.cat} {p.ean && <>&nbsp;·&nbsp; EAN: {p.ean}</>}</div>
                </div>
                <span className="badge bg-primary ms-2 flex-shrink-0">{p.price.toLocaleString('cs-CZ')} Kč</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

    setPolozky(prev => {
      const existing = prev.find(r => r.id === p.id);
      if (existing) return prev.map(r => r.id === p.id ? { ...r, qty: r.qty + 1 } : r);
      return [...prev, { id: p.id, name: p.short, ean: p.ean, producer: p.producer, price: p.price, qty: 1, sleva: 0 }];
    });
  };

  const updateRow = (id, field, value) => {
    setPolozky(prev => prev.map(r => r.id === id ? { ...r, [field]: Number(value) } : r));
  };

  const removeRow = (id) => setPolozky(prev => prev.filter(r => r.id !== id));

  const radkyCelkem = (r) => Math.round(r.price * r.qty * (1 - r.sleva / 100));
  const celkemBezDph = polozky.reduce((s, r) => s + radkyCelkem(r), 0);
  const dph = Math.round(celkemBezDph * 0.21);
  const celkemSDph = celkemBezDph + dph;

    const e = {};
    if (!klient) e.klient = 'Vyberte klienta.';

              {klient && (
                <div className="row g-3 mt-1">
                  <div className="col-md-4">
                    <label className="form-label small fw-semibold">Doručovací adresa</label>
                    <input className="form-control form-control-sm" defaultValue={klient.street} />
                  </div>
                  <div className="col-md-2">
                    <label className="form-label small fw-semibold">PSČ</label>
                    <input className="form-control form-control-sm" defaultValue={klient.zip} />
                  </div>
                  <div className="col-md-3">
                    <label className="form-label small fw-semibold">Město</label>
                    <input className="form-control form-control-sm" defaultValue={klient.city} />
                  </div>
                  <div className="col-md-2">
                    <label className="form-label small fw-semibold">Země</label>
                    <input className="form-control form-control-sm" defaultValue={klient.country} />
                  </div>
                  <div className="col-md-1">
                    <label className="form-label small fw-semibold">&nbsp;</label>
                    <div><button className="btn btn-outline-secondary btn-sm w-100">+</button></div>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* Sekce 2 – Parametry zakázky */}
          <div className="card shadow-sm mb-3">
            <div className="card-body">
              <div className="section-title"><i className="bi bi-sliders me-2"></i>Parametry zakázky</div>
              <div className="row g-3">
                <div className="col-md-3">
                  <label className="form-label small fw-semibold">Způsob dopravy <span className="text-danger">*</span></label>
                  <select className={`form-select form-select-sm ${errors.doprava ? 'is-invalid' : ''}`} value={params.doprava} onChange={e => setParam('doprava', e.target.value)}>
                    <option value="">Zvolte…</option>
                    {DOPRAVY.map(d => <option key={d}>{d}</option>)}
                  </select>
                  {errors.doprava && <div className="invalid-feedback">{errors.doprava}</div>}
                </div>
                <div className="col-md-3">
                  <label className="form-label small fw-semibold">Typ platby <span className="text-danger">*</span></label>
                  <select className={`form-select form-select-sm ${errors.platba ? 'is-invalid' : ''}`} value={params.platba} onChange={e => setParam('platba', e.target.value)}>
                    <option value="">Zvolte…</option>
                    {PLATBY.map(p => <option key={p}>{p}</option>)}
                  </select>
                  {errors.platba && <div className="invalid-feedback">{errors.platba}</div>}
                </div>
                <div className="col-md-2">
                  <label className="form-label small fw-semibold">Priorita</label>
                  <select className="form-select form-select-sm" value={params.priorita} onChange={e => setParam('priorita', e.target.value)}>
                    <option>Normální</option>
                    <option>Vysoká</option>
                    <option>Urgentní</option>
                  </select>
                </div>
                <div className="col-md-3">
                  <label className="form-label small fw-semibold">Řešitel</label>
                  <select className="form-select form-select-sm" value={params.resitel} onChange={e => setParam('resitel', e.target.value)}>
                    <option value="">— nepřiřazen —</option>
                    {RESITELE.map(r => <option key={r}>{r}</option>)}
                  </select>
                </div>
                <div className="col-12">
                  <label className="form-label small fw-semibold">Poznámka k zakázce</label>
                  <textarea className="form-control form-control-sm" rows={2} placeholder="Nepovinná interní poznámka…" value={params.poznamka} onChange={e => setParam('poznamka', e.target.value)} />
                </div>
              </div>
            </div>
          </div>

          {/* Sekce 3 – Položky */}
          <div className="card shadow-sm mb-3">
            <div className="card-body">
              <div className="d-flex align-items-center justify-content-between mb-3">
                <div className="section-title mb-0"><i className="bi bi-list-ul me-2"></i>Položky zakázky</div>
                <button className="btn btn-outline-secondary btn-sm"><i className="bi bi-upload me-1"></i>Import CSV/XLS</button>
              </div>

              <div className="mb-3">
                <label className="form-label small fw-semibold">Přidat produkt (název, EAN nebo výrobce)</label>
                <ProductSearch onAdd={addProduct} />
                {errors.polozky && <div className="text-danger small mt-1"><i className="bi bi-exclamation-circle me-1"></i>{errors.polozky}</div>}
              </div>

              {polozky.length > 0 ? (
                <div className="table-responsive">
                  <table className="table table-bordered table-sm mb-0">
                    <thead className="table-dark">
                      <tr>
                        <th style={{width: 160}}>EAN</th>
                        <th>Produkt</th>
                        <th style={{width: 80}} className="text-center">Počet ks</th>
                        <th style={{width: 110}} className="text-end">Cena/ks (Kč)</th>
                        <th style={{width: 80}} className="text-center">Sleva %</th>
                        <th style={{width: 110}} className="text-end">Celkem (Kč)</th>
                        <th style={{width: 48}} className="text-center"></th>
                      </tr>
                    </thead>
                    <tbody>
                      {polozky.map(r => (
                        <tr key={r.id}>
                          <td className="small text-muted">{r.ean || '—'}</td>
                          <td>
                            <div className="small fw-semibold">{r.name}</div>
                            <div className="text-muted" style={{fontSize: '0.75rem'}}>{r.producer}</div>
                          </td>
                          <td>
                            <input type="number" min={1} className="form-control form-control-sm text-center" value={r.qty} onChange={e => updateRow(r.id, 'qty', e.target.value)} />
                          </td>
                          <td>
                            <input type="number" min={0} className="form-control form-control-sm text-end" value={r.price} onChange={e => updateRow(r.id, 'price', e.target.value)} />
                          </td>
                          <td>
                            <input type="number" min={0} max={100} className="form-control form-control-sm text-center" value={r.sleva} onChange={e => updateRow(r.id, 'sleva', e.target.value)} />
                          </td>
                          <td className="text-end fw-semibold small align-middle">{radkyCelkem(r).toLocaleString('cs-CZ')}</td>
                          <td className="text-center align-middle">
                            <button className="btn btn-sm btn-outline-danger py-0 px-1" onClick={() => removeRow(r.id)}><i className="bi bi-trash"></i></button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ) : (
                <div className="text-center text-muted py-4 border rounded" style={{background: '#fafafa'}}>
                  <i className="bi bi-inbox fs-3 d-block mb-2 text-secondary"></i>
                  Zatím žádné položky. Vyhledejte produkt výše nebo importujte soubor.
                </div>
              )}
            </div>
          </div>

          {/* Souhrn */}
          {polozky.length > 0 && (
            <div className="card shadow-sm mb-3">
              <div className="card-body">
                <div className="row justify-content-end">
                  <div className="col-md-4">
                    <table className="table table-sm mb-0">
                      <tbody>
                        <tr>
                          <td className="text-muted">Celkem bez DPH</td>
                          <td className="text-end fw-semibold">{celkemBezDph.toLocaleString('cs-CZ')} Kč</td>
                        </tr>
                        <tr>
                          <td className="text-muted">DPH (21 %)</td>
                          <td className="text-end">{dph.toLocaleString('cs-CZ')} Kč</td>
                        </tr>
                        <tr className="table-active fw-bold">
                          <td>Celkem s DPH</td>
                          <td className="text-end fs-5">{celkemSDph.toLocaleString('cs-CZ')} Kč</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Akční tlačítka */}
          <div className="d-flex align-items-center gap-2 pb-4">
            <button className="btn btn-primary" onClick={handleUlozit} disabled={saving}>
              {saving ? <><span className="spinner-border spinner-border-sm me-2"></span>Ukládám…</> : <><i className="bi bi-check-lg me-1"></i>Uložit zakázku</>}
            </button>
            <a href="index.html" className="btn btn-secondary">Zrušit</a>
            <button className="btn btn-outline-danger ms-auto" onClick={() => { if (confirm('Opravdu zahodit rozdělanou zakázku?')) window.location.href = 'index.html'; }}>
              <i className="bi bi-x-circle me-1"></i>Zahodit
            </button>
          </div>
        </div>
      </div>

      {/* Toast */}
      <div className="toast-container position-fixed bottom-0 end-0 p-3">
        <div ref={toastRef} className="toast align-items-center text-bg-success border-0" role="alert">
          <div className="d-flex">
            <div className="toast-body"><i className="bi bi-check-circle me-2"></i>{toastMsg}</div>
            <button type="button" className="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
